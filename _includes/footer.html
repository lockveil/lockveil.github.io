<footer class="d-flex justify-content-center align-items-center flex-column gap-2 py-3">
  <p class="mb-0" style="opacity: 0.5; font-size: 0.8rem; letter-spacing: 0.05em;">
    © <span id="copyright-year"></span> lockveil
  </p>
  <script>
    document.getElementById('copyright-year').textContent = new Date().getFullYear();
  </script>
  <script src="/assets/js/push.js"></script>
</footer>

<!-- Floating subscribe button -->
<button onclick="subscribe()" id="subscribe-fab" style="
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.13);
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.8rem;
  color: inherit;
  opacity: 0.7;
  transition: opacity 0.2s, background 0.2s, transform 0.2s;
  letter-spacing: 0.04em;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
"
onmouseover="this.style.opacity='1'; this.style.background='rgba(255,255,255,0.12)'; this.style.transform='scale(1.05)'"
onmouseout="this.style.opacity='0.7'; this.style.background='rgba(255,255,255,0.06)'; this.style.transform='scale(1)'">
  🔔 Subscribe
</button>
