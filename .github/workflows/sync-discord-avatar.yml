name: Sync Discord Avatar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save Discord avatar
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: |
          AVATAR_HASH=$(curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            "https://discord.com/api/v10/users/$DISCORD_USER_ID" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['avatar'])")

          mkdir -p assets/img/Avatars
          curl -sL "https://cdn.discordapp.com/avatars/$DISCORD_USER_ID/$AVATAR_HASH.png?size=256" \
            -o assets/img/Avatars/wrose.jpg

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/img/Avatars/wrose.jpg
          git diff --cached --quiet || git commit -m "chore: sync Discord avatar"
          git push

      - name: Trigger Pages build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/lockveil/lockveil.github.io/pages/builds"
