name: "Send Notification"
on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type'
        required: true
        default: 'latest_post'
        type: choice
        options:
          - 'latest_post'
          - 'custom'
      title:
        description: 'Custom title (only if type is custom)'
        required: false
        default: ''
      body:
        description: 'Custom body (only if type is custom)'
        required: false
        default: ''
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send push notification
        run: |
          curl -X POST https://notif.lockveil.workers.dev/notify \
            -H 'Authorization: Bearer ${{ secrets.NOTIFY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{"type":"${{ github.event.inputs.type }}","title":"${{ github.event.inputs.title }}","body":"${{ github.event.inputs.body }}"}'
